<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerSpace | Playing</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="play-page">
    <div class="glass-background"></div>

    <div class="play-container">
        <header class="play-header">
            <a href="index.html" class="back-btn">
                <span>&larr;</span> Back to Hub
            </a>
            <div class="game-meta">
                <h2 id="game-title" style="font-family: 'Outfit', sans-serif; font-size: 1.2rem;">Loading...</h2>
            </div>
            <div style="display: flex; gap: 16px;">
                <div class="score-display">
                    <span class="label">Score:</span>
                    <span id="current-score" class="score-value">0</span>
                </div>
                <div class="score-display" style="border-color: rgba(250, 204, 21, 0.3); background: rgba(250, 204, 21, 0.05);">
                    <span class="label">Best:</span>
                    <span id="best-score" class="score-value" style="color: #facc15;">0</span>
                </div>
            </div>
        </header>

        <main class="canvas-wrapper">
            <div class="scanline"></div>
            <canvas id="gameCanvasFull"></canvas>
            
            <div id="game-overlay" class="overlay hidden">
                <div class="overlay-content">
                    <h2 id="final-score-text">Game Over!</h2>
                    <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
                        <button onclick="restartGame()" class="play-button" style="opacity: 1; transform: none; background: #fff; color: #000;">Try Again</button>
                        <a href="index.html" class="play-button" style="opacity: 1; transform: none; background: rgba(255,255,255,0.1);">Exit to Hub</a>
                    </div>
                </div>
            </div>
        </main>

        <footer class="game-controls" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); border: none; background: none;">
            <div id="controls-hint" style="color: var(--text-secondary); font-size: 0.9rem; display: flex; gap: 24px;">
                <!-- Filled by JS -->
            </div>
        </footer>
    </div>

    <!-- Background Decoration -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <script src="main.js"></script>
</body>
</html>
